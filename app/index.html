<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing App - GST Invoicing for Your Business</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <a href="#dashboard">myBillBook</a>
      </div>
      <div class="sidebar-business">
        <label class="sidebar-label">Working with</label>
        <select id="current-business-select" class="sidebar-business-select" title="Switch business">
        </select>
      </div>
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-link">Dashboard</a>
        <a href="#invoice-new" class="nav-link">+ New Invoice</a>
        <a href="#invoices" class="nav-link">Invoices</a>
        <a href="#customers" class="nav-link">Customers</a>
        <a href="#products" class="nav-link">Products</a>
        <a href="#reports" class="nav-link">Reports</a>
        <a href="#settings" class="nav-link">Settings</a>
      </nav>
      <div class="sidebar-auth" id="sidebar-auth"></div>
    </aside>
    <main id="main" class="main"></main>
  </div>
  <div id="auth-modal" class="modal hidden">
    <div class="modal-content modal-sm">
      <h2 style="margin-top:0;">Sign in to sync across devices</h2>
      <p class="muted" style="margin-bottom:16px;">Use the same account on any device to access your data.</p>
      <form id="auth-form">
        <div class="form-group"><label>Email</label><input type="email" id="auth-email" required placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="auth-password" required minlength="6" placeholder="••••••••" /></div>
        <div id="auth-error" class="auth-error hidden"></div>
        <div class="form-actions" style="margin-top:16px;">
          <button type="button" class="btn btn-outline modal-close">Cancel</button>
          <button type="submit" name="action" value="signin" class="btn btn-primary">Sign in</button>
          <button type="submit" name="action" value="signup" class="btn btn-outline">Sign up</button>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
