<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing App — GST Invoicing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    .home-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; background: linear-gradient(180deg, #f0fdfa 0%, #fff 100%); }
    .home-wrap .logo { font-size: 1.75rem; font-weight: 800; color: #0d9488; text-decoration: none; margin-bottom: 32px; }

    .home-wrap .btn-primary { display: inline-block; padding: 14px 28px; background: #0d9488; color: #fff; font-weight: 600; font-size: 1rem; text-decoration: none; border-radius: 12px; transition: background 0.2s; }

  <div class="home-wrap">
